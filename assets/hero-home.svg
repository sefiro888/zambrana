<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Técnico de Persianas Zambrana instalando una persiana en una vivienda de Málaga">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B2F38"/>
      <stop offset="1" stop-color="#16181D"/>
    </linearGradient>
    <linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE082"/>
      <stop offset="1" stop-color="#FFC400"/>
    </linearGradient>
    <linearGradient id="hlama" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD24A"/>
      <stop offset="1" stop-color="#E6A100"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="600" fill="url(#hbg)"/>
  <rect width="800" height="600" fill="url(#hbg)"/>
  <circle cx="650" cy="130" r="240" fill="#FFC400" opacity="0.08"/>

  <!-- Pared interior -->
  <rect x="60" y="60" width="520" height="470" rx="8" fill="#23262F"/>

  <!-- Ventana con persiana -->
  <g>
    <!-- Marco -->
    <rect x="120" y="100" width="380" height="360" rx="6" fill="#16181D"/>
    <rect x="138" y="118" width="344" height="324" rx="4" fill="url(#hsky)"/>
    <!-- Vista exterior (sol / cielo) -->
    <circle cx="430" cy="190" r="46" fill="#FFFFFF" opacity="0.55"/>
    <!-- Caja de la persiana -->
    <rect x="120" y="86" width="380" height="34" rx="6" fill="#2B2F38"/>
    <!-- Lamas bajadas (mitad superior) -->
    <g>
      <rect x="138" y="120" width="344" height="12" rx="3" fill="url(#hlama)"/>
      <rect x="138" y="135" width="344" height="12" rx="3" fill="url(#hlama)"/>
      <rect x="138" y="150" width="344" height="12" rx="3" fill="url(#hlama)"/>
      <rect x="138" y="165" width="344" height="12" rx="3" fill="url(#hlama)"/>
      <rect x="138" y="180" width="344" height="12" rx="3" fill="url(#hlama)" opacity="0.96"/>
      <rect x="138" y="195" width="344" height="12" rx="3" fill="url(#hlama)" opacity="0.9"/>
      <!-- ranuras de luz -->
      <rect x="138" y="210" width="344" height="3" fill="#16181D" opacity="0.25"/>
    </g>
  </g>

  <!-- Técnico (figura plana) -->
  <g transform="translate(470,250)">
    <!-- Sombra -->
    <ellipse cx="80" cy="280" rx="110" ry="20" fill="#000000" opacity="0.25"/>
    <!-- Piernas -->
    <rect x="48" y="170" width="32" height="110" rx="12" fill="#2B2F38"/>
    <rect x="84" y="170" width="32" height="110" rx="12" fill="#23262F"/>
    <!-- Botas -->
    <rect x="40" y="272" width="44" height="18" rx="8" fill="#16181D"/>
    <rect x="82" y="272" width="44" height="18" rx="8" fill="#16181D"/>
    <!-- Torso con chaleco amarillo -->
    <rect x="40" y="78" width="84" height="100" rx="22" fill="#FFC400"/>
    <rect x="56" y="80" width="52" height="96" rx="16" fill="#16181D"/>
    <!-- Banda reflectante -->
    <rect x="40" y="120" width="84" height="10" fill="#FFFFFF" opacity="0.8"/>
    <!-- Brazo levantado hacia la persiana -->
    <rect x="14" y="86" width="30" height="80" rx="14" fill="#FFC400" transform="rotate(-32 29 126)"/>
    <circle cx="2" cy="70" r="13" fill="#E8B98F"/>
    <!-- Cabeza -->
    <circle cx="82" cy="46" r="30" fill="#E8B98F"/>
    <!-- Casco -->
    <path d="M50 44 a32 32 0 0 1 64 0 z" fill="#FFC400"/>
    <rect x="46" y="42" width="72" height="9" rx="4" fill="#E6A100"/>
  </g>

  <!-- Tarjeta flotante de valoración -->
  <g transform="translate(540,470)">
    <rect x="0" y="0" width="220" height="86" rx="16" fill="#FFFFFF"/>
    <text x="22" y="42" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="800" fill="#16181D">4,8</text>
    <g transform="translate(88,24)" fill="#FFC400">
      <path d="M0 6 l2 4 4 0 -3 3 1 4 -4-2 -4 2 1-4 -3-3 4 0z"/>
    </g>
    <text x="92" y="40" font-family="Arial, sans-serif" font-size="20" fill="#FFC400" letter-spacing="2">★★★★★</text>
    <text x="92" y="64" font-family="Arial, sans-serif" font-size="14" fill="#5A616E">+400 reseñas · Google</text>
  </g>
</svg>
