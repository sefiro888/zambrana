<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Persianas Zambrana">
  <!-- Marco -->
  <rect x="6" y="5" width="36" height="38" rx="5" fill="#16181D"/>
  <rect x="9" y="8" width="30" height="32" rx="3" fill="#1F222A"/>
  <!-- Lamas de la persiana -->
  <g fill="#FFC400">
    <rect x="12" y="11" width="24" height="3.4" rx="1.5"/>
    <rect x="12" y="16" width="24" height="3.4" rx="1.5" opacity="0.92"/>
    <rect x="12" y="21" width="24" height="3.4" rx="1.5" opacity="0.84"/>
    <rect x="12" y="26" width="24" height="3.4" rx="1.5" opacity="0.7"/>
  </g>
  <!-- Lamas inferiores (parte recogida en metálico) -->
  <g fill="#B7BDC6">
    <rect x="12" y="31" width="24" height="2.6" rx="1.3"/>
    <rect x="12" y="34.5" width="24" height="2.6" rx="1.3" opacity="0.85"/>
  </g>
  <!-- Tirador / cinta -->
  <circle cx="24" cy="38.5" r="1.6" fill="#FFC400"/>
</svg>
