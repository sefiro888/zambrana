<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Técnico revisando y reparando el mecanismo de una persiana atascada">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F9FB"/><stop offset="1" stop-color="#ECEEF2"/>
    </linearGradient>
    <linearGradient id="rlama" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD24A"/><stop offset="1" stop-color="#E6A100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#rbg)"/>
  <circle cx="120" cy="80" r="170" fill="#FFC400" opacity="0.08"/>

  <!-- Ventana con persiana -->
  <rect x="150" y="60" width="380" height="380" rx="8" fill="#16181D"/>
  <rect x="168" y="92" width="344" height="332" rx="4" fill="#23262F"/>
  <!-- Caja superior -->
  <rect x="150" y="48" width="380" height="34" rx="6" fill="#2B2F38"/>
  <!-- Lamas (con una torcida = avería) -->
  <g>
    <rect x="180" y="100" width="320" height="16" rx="4" fill="url(#rlama)"/>
    <rect x="180" y="122" width="320" height="16" rx="4" fill="url(#rlama)"/>
    <rect x="184" y="146" width="312" height="16" rx="4" fill="url(#rlama)" transform="rotate(-3 340 154)"/>
    <rect x="180" y="170" width="320" height="16" rx="4" fill="url(#rlama)"/>
    <rect x="180" y="192" width="320" height="16" rx="4" fill="url(#rlama)" opacity="0.9"/>
    <rect x="180" y="214" width="320" height="16" rx="4" fill="url(#rlama)" opacity="0.82"/>
    <!-- Lama partida/atascada destacada -->
    <rect x="180" y="238" width="150" height="16" rx="4" fill="#B7BDC6"/>
    <rect x="350" y="238" width="150" height="16" rx="4" fill="#B7BDC6"/>
  </g>

  <!-- Señal de avería -->
  <g transform="translate(300,236)">
    <circle cx="20" cy="20" r="22" fill="#E63946"/>
    <rect x="17" y="9" width="6" height="14" rx="3" fill="#fff"/>
    <circle cx="20" cy="29" r="3.2" fill="#fff"/>
  </g>

  <!-- Mano con llave inglesa ajustando el mecanismo lateral -->
  <g transform="translate(486,150)">
    <!-- recogedor lateral -->
    <rect x="0" y="0" width="40" height="120" rx="8" fill="#2B2F38"/>
    <circle cx="20" cy="60" r="14" fill="#FFC400"/>
    <circle cx="20" cy="60" r="5" fill="#16181D"/>
  </g>
  <!-- Llave inglesa -->
  <g transform="translate(540,150) rotate(35)">
    <rect x="0" y="20" width="120" height="20" rx="8" fill="#9AA1AC"/>
    <path d="M-6 8 h34 v10 h-20 v14 h20 v10 h-34 a8 8 0 0 1 -8-8 v-28 a8 8 0 0 1 8-8 z" fill="#B7BDC6"/>
    <circle cx="120" cy="30" r="16" fill="#E8B98F"/>
  </g>

  <!-- Tornillo / detalle -->
  <g transform="translate(95,330)">
    <circle cx="0" cy="0" r="26" fill="#FFC400"/>
    <path d="M-10 0 h20 M0 -10 v20" stroke="#16181D" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
