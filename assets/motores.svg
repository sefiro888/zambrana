<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Instalación de un motor tubular para automatizar una persiana con mando a distancia">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F9FB"/><stop offset="1" stop-color="#ECEEF2"/>
    </linearGradient>
    <linearGradient id="mlama" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD24A"/><stop offset="1" stop-color="#E6A100"/>
    </linearGradient>
    <linearGradient id="mtubo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D7DBE0"/><stop offset="0.5" stop-color="#9AA1AC"/><stop offset="1" stop-color="#B7BDC6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mbg)"/>
  <circle cx="660" cy="90" r="170" fill="#FFC400" opacity="0.08"/>

  <!-- Persiana parcial -->
  <rect x="90" y="40" width="380" height="430" rx="8" fill="#16181D"/>
  <rect x="108" y="120" width="344" height="334" rx="4" fill="#23262F"/>
  <!-- Caja del cajón superior (donde va el motor) -->
  <rect x="90" y="40" width="380" height="76" rx="8" fill="#2B2F38"/>
  <rect x="104" y="54" width="352" height="48" rx="8" fill="#1F222A"/>

  <!-- Eje + motor tubular dentro del cajón -->
  <g transform="translate(120,60)">
    <rect x="0" y="6" width="300" height="36" rx="18" fill="url(#mtubo)"/>
    <!-- cabeza del motor -->
    <rect x="0" y="0" width="90" height="48" rx="14" fill="#16181D"/>
    <circle cx="45" cy="24" r="13" fill="#FFC400"/>
    <circle cx="45" cy="24" r="4" fill="#16181D"/>
    <!-- ranuras del tubo -->
    <g stroke="#7c828c" stroke-width="2">
      <line x1="120" y1="10" x2="120" y2="38"/>
      <line x1="160" y1="10" x2="160" y2="38"/>
      <line x1="200" y1="10" x2="200" y2="38"/>
      <line x1="240" y1="10" x2="240" y2="38"/>
    </g>
    <!-- cable -->
    <path d="M10 48 C 0 70, 18 86, 6 110" stroke="#16181D" stroke-width="5" fill="none"/>
  </g>

  <!-- Lamas -->
  <g>
    <rect x="122" y="128" width="316" height="18" rx="4" fill="url(#mlama)"/>
    <rect x="122" y="154" width="316" height="18" rx="4" fill="url(#mlama)"/>
    <rect x="122" y="180" width="316" height="18" rx="4" fill="url(#mlama)" opacity="0.93"/>
    <rect x="122" y="206" width="316" height="18" rx="4" fill="url(#mlama)" opacity="0.86"/>
    <rect x="122" y="232" width="316" height="18" rx="4" fill="url(#mlama)" opacity="0.78"/>
  </g>

  <!-- Mando a distancia -->
  <g transform="translate(520,250)">
    <rect x="0" y="0" width="120" height="200" rx="22" fill="#16181D"/>
    <rect x="16" y="18" width="88" height="44" rx="8" fill="#2B2F38"/>
    <text x="60" y="47" font-family="Arial, sans-serif" font-size="16" fill="#FFC400" text-anchor="middle">PZ</text>
    <!-- botón subir -->
    <circle cx="60" cy="100" r="22" fill="#FFC400"/>
    <path d="M50 106 l10-12 10 12" fill="none" stroke="#16181D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- stop -->
    <circle cx="60" cy="142" r="12" fill="#3A3F4A"/>
    <rect x="54" y="136" width="12" height="12" rx="2" fill="#FFC400"/>
    <!-- botón bajar -->
    <circle cx="60" cy="178" r="16" fill="#3A3F4A"/>
    <path d="M52 173 l8 10 8-10" fill="none" stroke="#FFC400" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Ondas de señal -->
  <g transform="translate(470,300)" stroke="#FFC400" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M40 0 a26 26 0 0 0 0 52" opacity="0.9"/>
    <path d="M28 12 a14 14 0 0 0 0 28" opacity="0.6"/>
  </g>
</svg>
